<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário — Eng. de Software</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDF0F6;
    --surface:#FFFFFF;
    --ink:#16203A;
    --ink-soft:#5A6478;
    --ink-faint:#8891A3;
    --line:#E2E6EE;
    --line-soft:#EDEFF4;

    --font-display:'Space Grotesk',system-ui,sans-serif;
    --font-body:'IBM Plex Sans',system-ui,sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,monospace;

    --radius:14px;
    --shadow:0 1px 2px rgba(22,32,58,.04),0 8px 24px rgba(22,32,58,.06);
    --shadow-hero:0 2px 4px rgba(22,32,58,.05),0 18px 40px rgba(22,32,58,.10);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:22px 16px 64px;
  }
  .wrap{max-width:560px;margin:0 auto}

  /* ---- header ---- */
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:500;
  }
  .head-row{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:12px;margin:6px 0 22px;
  }
  h1{font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:-.02em;line-height:1.05}
  .head-sub{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);margin-top:3px}

  .weeknav{display:flex;align-items:center;gap:2px;flex-shrink:0}
  .weeknav button{
    width:34px;height:34px;border:1px solid var(--line);background:var(--surface);
    border-radius:9px;cursor:pointer;color:var(--ink);font-size:16px;line-height:1;
    display:grid;place-items:center;transition:border-color .15s,background .15s;
  }
  .weeknav button:hover{border-color:var(--ink-faint)}
  .weeknav button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .weeknav .today-btn{width:auto;padding:0 12px;font-family:var(--font-mono);font-size:12px;font-weight:500}

  /* ---- section label ---- */
  .slabel{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.13em;
    text-transform:uppercase;color:var(--ink-faint);font-weight:600;
    margin:28px 2px 12px;display:flex;align-items:center;gap:8px;
  }
  .slabel::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---- próximo (hero) ---- */
  .hero{
    background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-hero);
    border-left:6px solid var(--sc,#888);padding:18px 20px;position:relative;overflow:hidden;
    animation:rise .5s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .hero-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
  .subj{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--sc,#888);flex-shrink:0}
  .hero-title{font-family:var(--font-display);font-weight:600;font-size:21px;letter-spacing:-.01em;margin-bottom:10px}
  .hero-meta{
    font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .countdown{
    color:var(--sc,#333);font-weight:600;
    background:color-mix(in srgb,var(--sc,#888) 12%,#fff);
    padding:2px 9px;border-radius:20px;
  }
  .hero-empty{color:var(--ink-soft);font-size:15px;padding:4px 0}

  /* ---- type badge ---- */
  .badge{
    font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;padding:3px 8px;border-radius:6px;white-space:nowrap;
  }
  .badge.prova{background:#FCE8E8;color:#B4232A}
  .badge.trabalho{background:#E5EDFB;color:#2A50A8}
  .badge.atividade{background:#E2F2E8;color:#1F7A44}
  .badge.evento{background:#EEE9F6;color:#6A4D9C}

  /* ---- filters ---- */
  .filters{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;margin:0 -2px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{
    flex-shrink:0;border:1px solid var(--line);background:var(--surface);
    border-radius:20px;padding:6px 13px;font-size:13px;font-weight:500;color:var(--ink-soft);
    cursor:pointer;display:inline-flex;align-items:center;gap:7px;
    transition:border-color .15s,color .15s,background .15s;
  }
  .chip .dot{width:8px;height:8px}
  .chip:hover{border-color:var(--ink-faint)}
  .chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.on .dot{box-shadow:0 0 0 1.5px rgba(255,255,255,.5)}

  /* ---- week grid ---- */
  .day{margin-bottom:2px}
  .day-head{
    display:flex;align-items:baseline;gap:9px;padding:9px 2px 5px;
  }
  .day-name{font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
  .day-date{font-family:var(--font-mono);font-size:12px;color:var(--ink-faint)}
  .day.is-today .day-name{color:var(--ink)}
  .today-tag{
    font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.1em;
    background:var(--ink);color:#fff;padding:2px 6px;border-radius:5px;text-transform:uppercase;
  }
  .class-card{
    background:var(--surface);border-radius:11px;box-shadow:var(--shadow);
    border-left:4px solid var(--sc,#888);padding:11px 14px;margin-bottom:7px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    transition:transform .12s;
  }
  .class-card:hover{transform:translateX(2px)}
  .cc-left{min-width:0}
  .cc-subj{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:7px}
  .cc-prof{font-size:12px;color:var(--ink-faint);margin-top:2px}
  .cc-right{text-align:right;flex-shrink:0}
  .cc-time{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--ink)}
  .cc-room{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:2px}
  .noclass{
    padding:10px 14px;border:1px dashed var(--line);border-radius:11px;
    color:var(--ink-faint);font-size:13px;display:flex;align-items:center;gap:8px;
    background:repeating-linear-gradient(135deg,transparent,transparent 8px,rgba(0,0,0,.012) 8px,rgba(0,0,0,.012) 16px);
  }
  .noclass strong{color:var(--ink-soft);font-weight:600}
  .empty-day{padding:8px 4px;color:var(--ink-faint);font-size:13px}

  /* ---- events list ---- */
  .ev{
    background:var(--surface);border-radius:11px;box-shadow:var(--shadow);
    padding:13px 14px;margin-bottom:8px;display:flex;gap:13px;align-items:center;
    transition:transform .12s;
  }
  .ev:hover{transform:translateX(2px)}
  .ev-date{
    font-family:var(--font-mono);text-align:center;flex-shrink:0;width:44px;
    border-right:1px solid var(--line-soft);padding-right:13px;
  }
  .ev-day{font-size:19px;font-weight:600;line-height:1;color:var(--sc,var(--ink))}
  .ev-mon{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
  .ev-body{min-width:0;flex:1}
  .ev-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
  .ev-subj{font-size:12px;font-weight:600;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px}
  .ev-title{font-weight:500;font-size:15px}
  .ev-when{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:3px}

  .foot{text-align:center;margin-top:34px;font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Eng. de Software · 4º período</div>
  <div class="head-row">
    <div>
      <h1>Agenda</h1>
      <div class="head-sub" id="weekRange">—</div>
    </div>
    <div class="weeknav">
      <button id="prevWk" aria-label="Semana anterior">‹</button>
      <button class="today-btn" id="todayBtn">HOJE</button>
      <button id="nextWk" aria-label="Próxima semana">›</button>
    </div>
  </div>

  <div class="slabel">Próximo</div>
  <div id="hero"></div>

  <div class="slabel">Filtrar por matéria</div>
  <div class="filters" id="filters"></div>

  <div class="slabel">Grade da semana</div>
  <div id="grid"></div>

  <div class="slabel">Próximos eventos</div>
  <div id="events"></div>

  <div class="foot">atualizado pela representação de turma</div>
</div>

<script>
/* ============ dados de exemplo ============ */
const subjects = {
  alglin:  {nome:"Álgebra Linear",     prof:"Prof. Marina Alves",  cor:"#5457C5"},
  calc:    {nome:"Cálculo II",          prof:"Prof. Roberto Lima",  cor:"#12897E"},
  edados:  {nome:"Estrutura de Dados",  prof:"Prof. Carla Souza",   cor:"#C77A0E"},
  req:     {nome:"Eng. de Requisitos",  prof:"Prof. Daniel Rocha",  cor:"#C13F7A"},
  bd:      {nome:"Banco de Dados",       prof:"Prof. Helena Dias",   cor:"#7C4DBB"},
};

// grade fixa: dia (1=seg ... 5=sex), matéria, horário, sala
const grade = [
  {dia:1, mat:"alglin", ini:"19:00", fim:"20:40", sala:"Sala 3"},
  {dia:1, mat:"calc",   ini:"20:50", fim:"22:30", sala:"Sala 3"},
  {dia:2, mat:"edados", ini:"19:00", fim:"20:40", sala:"Lab 2"},
  {dia:2, mat:"bd",     ini:"20:50", fim:"22:30", sala:"Lab 2"},
  {dia:3, mat:"req",    ini:"19:00", fim:"20:40", sala:"Sala 5"},
  {dia:4, mat:"calc",   ini:"19:00", fim:"20:40", sala:"Sala 3"},
  {dia:4, mat:"alglin", ini:"20:50", fim:"22:30", sala:"Sala 3"},
  {dia:5, mat:"bd",     ini:"19:00", fim:"20:40", sala:"Lab 1"},
];

/* datas relativas a hoje, pra o protótipo parecer sempre "vivo" */
const today = new Date(); today.setHours(0,0,0,0);
const iso = d => d.toISOString().slice(0,10);
const plus = n => { const d=new Date(today); d.setDate(d.getDate()+n); return iso(d); };

// eventos pontuais
const events = [
  {tipo:"prova",     mat:"alglin", titulo:"Prova — Unidade 2",        data:plus(3),  hora:"19:00"},
  {tipo:"trabalho",  mat:"edados", titulo:"Entrega do Projeto AVL",   data:plus(6),  hora:null},
  {tipo:"atividade", mat:"bd",     titulo:"Lista de SQL (vale nota)", data:plus(9),  hora:"23:59"},
  {tipo:"prova",     mat:"calc",   titulo:"Prova — Integrais",        data:plus(12), hora:"19:00"},
  {tipo:"evento",    mat:null,     titulo:"Semana Acadêmica",         data:plus(15), hora:null},
];

// cancelamentos: {data, mat}  (mat null = dia inteiro sem aula)
const cancellations = [
  {data:plus(4), mat:null},
];

/* ============ helpers ============ */
const DIAS = ["dom","seg","ter","qua","qui","sex","sáb"];
const DIAS_LONG = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
const MESES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const parse = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const fmtData = s => { const d=parse(s); return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`; };
function mondayOf(ref){ const d=new Date(ref); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); d.setHours(0,0,0,0); return d; }
function daysBetween(iso1){ const d=parse(iso1); return Math.round((d-today)/86400000); }
function relLabel(n){
  if(n<0) return "passou";
  if(n===0) return "hoje";
  if(n===1) return "amanhã";
  return `em ${n} dias`;
}
function isCancelled(isoDate, mat){
  return cancellations.some(c=>c.data===isoDate && (c.mat===null || c.mat===mat));
}

/* ============ estado ============ */
let weekOffset = 0;
let filter = null; // matéria selecionada ou null

/* ============ próximo (hero) ============ */
function nextClassOccurrences(horizon=21){
  const out=[];
  for(let i=0;i<horizon;i++){
    const d=new Date(today); d.setDate(d.getDate()+i);
    const wd=d.getDay(); const isoD=iso(d);
    grade.filter(g=>g.dia===wd).forEach(g=>{
      if(isCancelled(isoD,g.mat)) return;
      out.push({kind:"aula", mat:g.mat, titulo:subjects[g.mat].nome, data:isoD, hora:g.ini, sala:g.sala});
    });
  }
  return out;
}
function computeNext(){
  let pool = [
    ...events.map(e=>({kind:"evento",...e})),
    ...nextClassOccurrences(),
  ];
  if(filter) pool = pool.filter(x=>x.mat===filter);
  pool = pool.filter(x=>{
    const n=daysBetween(x.data);
    if(n>0) return true;
    if(n<0) return false;
    if(!x.hora) return true;                       // hoje sem hora → ainda conta
    const now=new Date();
    const [hh,mm]=x.hora.split(":").map(Number);
    return (hh*60+mm) >= (now.getHours()*60+now.getMinutes());
  });
  pool.sort((a,b)=>{
    if(a.data!==b.data) return a.data<b.data?-1:1;
    return (a.hora||"99:99") < (b.hora||"99:99") ? -1 : 1;
  });
  return pool[0]||null;
}

function renderHero(){
  const el=document.getElementById("hero");
  const nx=computeNext();
  if(!nx){ el.innerHTML=`<div class="hero" style="--sc:var(--ink-faint)"><div class="hero-empty">Nada por vir com esse filtro.</div></div>`; return; }
  const cor = nx.mat?subjects[nx.mat].cor:"#6A4D9C";
  const subjName = nx.mat?subjects[nx.mat].nome:"Turma";
  const n=daysBetween(nx.data);
  const d=parse(nx.data);
  const badge = nx.kind==="aula"?`<span class="badge" style="background:${cor}18;color:${cor}">aula</span>`
                                :`<span class="badge ${nx.tipo}">${nx.tipo}</span>`;
  const meta = [
    `${DIAS[d.getDay()]} ${fmtData(nx.data)}`,
    nx.hora?`${nx.hora.replace(":","h")}`:null,
    nx.sala||null,
  ].filter(Boolean).join(" · ");
  el.innerHTML=`
    <div class="hero" style="--sc:${cor}">
      <div class="hero-top">
        <span class="subj"><span class="dot"></span>${subjName}</span>
        ${badge}
      </div>
      <div class="hero-title">${nx.titulo}</div>
      <div class="hero-meta"><span>${meta}</span><span class="countdown">${relLabel(n)}</span></div>
    </div>`;
}

/* ============ filtros ============ */
function renderFilters(){
  const el=document.getElementById("filters");
  let html=`<button class="chip ${filter===null?'on':''}" data-f="">Todas</button>`;
  for(const [id,s] of Object.entries(subjects)){
    html+=`<button class="chip ${filter===id?'on':''}" data-f="${id}"><span class="dot" style="background:${s.cor}"></span>${s.nome}</button>`;
  }
  el.innerHTML=html;
  el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    filter=c.dataset.f||null; renderAll();
  });
}

/* ============ grade da semana ============ */
function renderGrid(){
  const el=document.getElementById("grid");
  const monday=mondayOf(today); monday.setDate(monday.getDate()+weekOffset*7);
  const sunday=new Date(monday); sunday.setDate(sunday.getDate()+6);
  document.getElementById("weekRange").textContent =
    `${String(monday.getDate()).padStart(2,"0")} ${MESES[monday.getMonth()]} – ${String(sunday.getDate()).padStart(2,"0")} ${MESES[sunday.getMonth()]}`;

  let html="";
  for(let i=0;i<5;i++){ // seg a sex
    const d=new Date(monday); d.setDate(d.getDate()+i);
    const isoD=iso(d); const wd=d.getDay();
    const isToday = isoD===iso(today);
    let rows = grade.filter(g=>g.dia===wd);
    if(filter) rows = rows.filter(g=>g.mat===filter);

    html+=`<div class="day ${isToday?'is-today':''}">
      <div class="day-head">
        <span class="day-name">${DIAS_LONG[wd]}</span>
        <span class="day-date">${fmtData(isoD)}</span>
        ${isToday?'<span class="today-tag">hoje</span>':''}
      </div>`;

    if(isCancelled(isoD,null)){
      html+=`<div class="noclass">✕ <strong>Sem aula</strong> — feriado / cancelado</div>`;
    } else if(rows.length===0){
      html+=`<div class="empty-day">${filter?'—':'Sem aulas'}</div>`;
    } else {
      rows.forEach(g=>{
        const s=subjects[g.mat];
        const cancel=isCancelled(isoD,g.mat);
        if(cancel){
          html+=`<div class="noclass">✕ <strong>${s.nome}</strong> cancelada</div>`;
        }else{
          html+=`<div class="class-card" style="--sc:${s.cor}">
            <div class="cc-left">
              <div class="cc-subj"><span class="dot"></span>${s.nome}</div>
              <div class="cc-prof">${s.prof}</div>
            </div>
            <div class="cc-right">
              <div class="cc-time">${g.ini}–${g.fim}</div>
              <div class="cc-room">${g.sala}</div>
            </div>
          </div>`;
        }
      });
    }
    html+=`</div>`;
  }
  el.innerHTML=html;
}

/* ============ próximos eventos ============ */
function renderEvents(){
  const el=document.getElementById("events");
  let list=events.map(e=>({...e})).filter(e=>daysBetween(e.data)>=0);
  if(filter) list=list.filter(e=>e.mat===filter);
  list.sort((a,b)=>a.data<b.data?-1:1);
  if(list.length===0){ el.innerHTML=`<div class="empty-day">Nenhum evento marcado${filter?' pra essa matéria':''}.</div>`; return; }
  el.innerHTML=list.map(e=>{
    const cor=e.mat?subjects[e.mat].cor:"#6A4D9C";
    const subjName=e.mat?subjects[e.mat].nome:"Turma";
    const d=parse(e.data); const n=daysBetween(e.data);
    const when=[`${DIAS[d.getDay()]}`, e.hora?e.hora.replace(":","h"):null, relLabel(n)].filter(Boolean).join(" · ");
    return `<div class="ev" style="--sc:${cor}">
      <div class="ev-date">
        <div class="ev-day">${String(d.getDate()).padStart(2,"0")}</div>
        <div class="ev-mon">${MESES[d.getMonth()]}</div>
      </div>
      <div class="ev-body">
        <div class="ev-top">
          <span class="ev-subj"><span class="dot" style="background:${cor}"></span>${subjName}</span>
          <span class="badge ${e.tipo}">${e.tipo}</span>
        </div>
        <div class="ev-title">${e.titulo}</div>
        <div class="ev-when">${when}</div>
      </div>
    </div>`;
  }).join("");
}

/* ============ orquestra ============ */
function renderAll(){ renderFilters(); renderHero(); renderGrid(); renderEvents(); }

document.getElementById("prevWk").onclick=()=>{weekOffset--;renderGrid();};
document.getElementById("nextWk").onclick=()=>{weekOffset++;renderGrid();};
document.getElementById("todayBtn").onclick=()=>{weekOffset=0;renderGrid();};

renderAll();
</script>
</body>
</html>
